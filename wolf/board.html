<!DOCTYPE html>
<html>
<head>
<title>Board</title>
<style>
body{background:#0b0f1a;color:white;font-family:Arial;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.player{background:#1f2937;padding:15px;text-align:center;border-radius:10px;cursor:pointer}
.dead{background:red;text-decoration:line-through}
.hiddenRole{filter:blur(8px)}
.timer{margin:10px;font-size:24px}
button{margin:5px;padding:10px}
</style>
</head>
<body>
<h2>🧩 Game Board</h2>
<button onclick="toggleSecret()">👀 Secret Mode</button>
<button onclick="startDiscussion()">⏱ Discussion 3 min</button>
<button onclick="stopDiscussion()">⏹ Stop</button>
<div id="timer" class="timer"></div>
<div id="grid" class="grid"></div>

<script>
let secret=false;
let timerInterval=null;
let timeLeft=180;

let roles=JSON.parse(localStorage.getItem('roles'))||[];
let players=JSON.parse(localStorage.getItem('players'))||[];

let grid=document.getElementById('grid');
let playerIndex=0;

roles.forEach(r=>{
    for(let i=0;i<r.count;i++){
        let name=players[playerIndex++]||`Player ${playerIndex}`;
        let d=document.createElement('div');
        d.className='player';
        d.innerText=`${name}\n${r.role}`;
        d.onclick=()=>d.classList.toggle('dead');
        grid.appendChild(d);
    }
});

function toggleSecret(){
    secret=!secret;
    document.querySelectorAll('.player').forEach(p=>{
        p.classList.toggle('hiddenRole');
    });
}

function startDiscussion(){
    clearInterval(timerInterval);
    timeLeft=180;
    document.getElementById('timer').innerText=`⏱ ${timeLeft}s`;
    timerInterval=setInterval(()=>{
        timeLeft--;
        document.getElementById('timer').innerText=`⏱ ${timeLeft}s`;
        if(timeLeft<=0){
            clearInterval(timerInterval);
            alert('Times Up!');
        }
    },1000);
}

function stopDiscussion(){
    clearInterval(timerInterval);
    document.getElementById('timer').innerText='⏹ Discussion Stopped';
}
</script>
</body>
</html>
