<!DOCTYPE html>
<html>
<head>
<title>Randomizer</title>
<style>
body{background:#000;color:white;text-align:center;font-family:Arial}
.card{width:220px;height:320px;margin:50px auto;perspective:1000px}
.inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:1s}
.flip{transform:rotateY(180deg)}
.face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;overflow:hidden}
.front{background:url('https://i.imgur.com/6Iej2c3.jpeg') center/cover}
.back{background:#1f2937;transform:rotateY(180deg);display:flex;align-items:center;justify-content:center;font-size:20px}
button{padding:10px;margin:5px}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:black;opacity:.85;display:none;align-items:center;justify-content:center;font-size:30px;color:white}
</style>
</head>
<body>
<h2>🎴 Draw Card</h2>
<div class="card">
  <div id="card" class="inner">
    <div class="face front"></div>
    <div class="face back" id="role"></div>
  </div>
</div>

<button onclick="draw()">Draw</button>
<button onclick="hideCard()">Hide</button>
<button onclick="toggleNight()">🌙 Night / ☀️ Day</button>

<div id="overlay" class="overlay">🌙 Night Phase</div>

<script>
let roles=[];
let data=JSON.parse(localStorage.getItem('roles'))||[];

data.forEach(r=>{
    for(let i=0;i<r.count;i++) roles.push(r.role);
});

function draw(){
    if(roles.length==0){window.location='board.html';return}
    let i=Math.floor(Math.random()*roles.length);
    let role=roles.splice(i,1)[0];
    document.getElementById('role').innerText=role;
    document.getElementById('card').classList.add('flip');
}
function hideCard(){document.getElementById('card').classList.remove('flip');}
function toggleNight(){
    let o=document.getElementById('overlay');
    o.style.display=o.style.display==='flex'?'none':'flex';
}
</script>
</body>
</html>
