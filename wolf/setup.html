<!DOCTYPE html>
<html>
<head>
<title>Setup Roles</title>
<style>
body{font-family:Arial;background:#0b0f1a;color:white;padding:20px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.role{background:#1f2937;padding:10px;border-radius:10px;text-align:center}
input[type=number]{width:50px;margin-top:5px}
textarea{width:100%;height:100px;margin-top:10px}
button{padding:12px;background:#22c55e;border:none;margin-top:20px;width:100%}
</style>
</head>
<body>
<h2>🎭 Role & Player Setup</h2>

<div id="roles" class="grid"></div>

<h3>Player Names (one per line)</h3>
<textarea id="playerNames" placeholder="Enter each player name on a new line"></textarea>

<button onclick="saveRoles()">Continue →</button>

<script>
const list=[
"🐺 Wolf","🧿 Cursed one","😈 Madman","🧪 Witch","👤 Villager","🐌 Tough as nail",
"🔮 Seer","💉 Healer","🌿 Druid","🌀 Shapeshifter","❤️ Lovers","🎭 Jester",
"👑 Mayor","🏹 Hunter","👦 Little boy","🎩 Illusionist","🔥 Arsonist","🐺 Wolf shaman",
"🛡️ Bodyguard","👻 Medium","⛪ Priest","🧠 Amnesiac","👥 Doppelganger","🤡 Fool",
"🤫 Silencer","⛔ Roleblocker"
];

let div = document.getElementById('roles');
list.forEach(r=>{
    let d = document.createElement('div');
    d.className='role';
    d.innerHTML = `<label><input type='checkbox' value='${r}'> ${r}</label><br>Count:<input type='number' value='0'>`;
    div.appendChild(d);
});

function saveRoles(){
    let data = [];
    document.querySelectorAll('.role').forEach(row=>{
        let cb = row.querySelector('input[type=checkbox]');
        let num = row.querySelector('input[type=number]');
        if(cb.checked && num.value>0){
            data.push({role: cb.value, count: Number(num.value)});
        }
    });
    let names = document.getElementById('playerNames').value
                    .split('\n')
                    .map(n=>n.trim())
                    .filter(n=>n);
    localStorage.setItem('roles', JSON.stringify(data));
    localStorage.setItem('players', JSON.stringify(names));
    window.location='randomizer.html';
}
</script>
</body>
</html>
